name: Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check app syntax
        run: node --check app.js

      - name: Check data syntax
        run: node --check data/game-data.js
