<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Space Save State Assertions</title>
    <style>
      body {
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        color: #241d18;
        background: #fffaf2;
      }

      iframe {
        width: 1280px;
        height: 720px;
        border: 1px solid rgba(112, 83, 58, 0.18);
      }

      pre {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Agent Space Save State Assertions</h1>
    <pre id="report">Running...</pre>
    <iframe id="appFrame"></iframe>
    <script>
      const SAVE_KEY = "agent-space-demo-save";
      const LEGACY_SAVE_KEY = "agent-space-demo-save-v1";
      const DEV_STAGE_MIN_COINS = 999999;
      const report = document.querySelector("#report");
      const frame = document.querySelector("#appFrame");
      const assertions = [];

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function assert(condition, message) {
        assertions.push({ pass: Boolean(condition), message });
        if (!condition) throw new Error(message);
      }

      function clickFirstReplacement(doc) {
        const buttons = Array.from(doc.querySelectorAll("#decorateItemList .decor-card"));
        assert(buttons.length >= 2, "expected at least two replacement options");
        const replacement = buttons.find((button) => !button.classList.contains("active"));
        assert(Boolean(replacement), "expected a non-active replacement item");
        replacement.click();
      }

      async function run() {
        try {
          window.localStorage.removeItem(SAVE_KEY);
          window.localStorage.removeItem(LEGACY_SAVE_KEY);
          window.localStorage.setItem(
            LEGACY_SAVE_KEY,
            JSON.stringify({
              inventory: {
                owned: {
                  bed_pink_basic: 1,
                  bed_blue_ocean: 1,
                },
                coins: 12,
              },
              sceneSnapshot: {
                indoor: {
                  placedObjects: {
                    bedroomBed: { itemId: "bed_blue_ocean" },
                  },
                },
              },
            }),
          );
          frame.src = "../index.html";
          await new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
          await wait(250);

          const appWindow = frame.contentWindow;
          const doc = appWindow.document;
          assert(doc.querySelector("#saveSchemaLabel")?.textContent === "Schema v2", "schema label should show v2");
          assert(doc.querySelector("#saveDebugMeta")?.textContent.includes("已迁移旧存档"), "debug meta should show legacy migration");
          assert(
            Number(doc.querySelector("#coinValue")?.textContent || 0) >= DEV_STAGE_MIN_COINS,
            "legacy save coins should be uplifted to dev-stage minimum",
          );

          doc.querySelector("#settingsBtn").click();
          await wait(120);
          assert(doc.querySelector("#decorateDrawer")?.classList.contains("open"), "settings button should open decorate drawer");
          clickFirstReplacement(doc);
          await wait(120);

          const saved = JSON.parse(window.localStorage.getItem(SAVE_KEY) || "{}");
          assert(saved.schemaVersion === 2, "saved payload should include schemaVersion 2");
          assert(Boolean(saved.savedAt), "saved payload should include savedAt");
          assert(Boolean(saved.inventory?.owned), "saved payload should include inventory.owned");
          assert(saved.inventory?.coins >= DEV_STAGE_MIN_COINS, "saved payload should keep dev-stage minimum coins");
          assert(
            Boolean(saved.sceneSnapshot?.indoor?.placedObjects?.bedroomBed?.itemId),
            "saved payload should include indoor placed object item ids",
          );
          assert(!window.localStorage.getItem(LEGACY_SAVE_KEY), "legacy save key should be removed after new save");
          assert(doc.querySelector("#saveDebugMeta")?.textContent.includes("已保存"), "debug meta should reflect saved status");

          appWindow.confirm = () => true;
          doc.querySelector("#resetSaveBtn").click();
          await wait(120);
          assert(!window.localStorage.getItem(SAVE_KEY), "reset should remove the current save key");
          assert(!window.localStorage.getItem(LEGACY_SAVE_KEY), "reset should remove the legacy save key");

          const passed = assertions.filter((item) => item.pass).length;
          report.textContent = `SAVE_STATE_TEST_PASS\n${passed} browser assertions passed.`;
          document.title = "PASS Agent Space Save State";
        } catch (error) {
          report.textContent = `SAVE_STATE_TEST_FAIL\n${error.stack || error.message}`;
          document.title = "FAIL Agent Space Save State";
          throw error;
        }
      }

      run();
    </script>
  </body>
</html>
